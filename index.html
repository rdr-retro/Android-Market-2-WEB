<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria Web</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .galeria {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      align-items: start;
    }

    figure {
      margin: 0;
      background: #1b1b1b;
      border-radius: 12px;
      padding: 12px;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      background: #000;
    }

    figcaption {
      margin-top: 10px;
      font-size: 14px;
      color: #cfcfcf;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Imágenes en /web</h1>

  <section class="galeria">
    <figure>
      <img src="android-logo-white.jpg" alt="android-logo-white" />
      <figcaption>android-logo-white.jpg</figcaption>
    </figure>

    <figure>
      <img src="market 2.png" alt="market 2" />
      <figcaption>market 2.png</figcaption>
    </figure>
  </section>
</body>
</html>
